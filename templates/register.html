<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Simdragosa — Register</title>
<link rel="icon" type="image/png" href="/static/simdragosa-icon.png">
<style>
:root {
  --bg:     #13131f;
  --surf:   #1c1c2e;
  --surf2:  #252538;
  --border: #2e2e48;
  --text:   #dde0f0;
  --sub:    #7878a0;
  --accent: #7c6af7;
  --acc-h:  #9a8cff;
  --red:    #f87171;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Segoe UI', system-ui, sans-serif;
  font-size: 14px;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}
.card {
  background: var(--surf);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 36px 40px;
  width: 100%;
  max-width: 360px;
}
h1 {
  font-size: 1.1rem;
  font-weight: 700;
  letter-spacing: .04em;
  color: var(--acc-h);
  margin-bottom: 24px;
  text-align: center;
}
label {
  display: block;
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .08em;
  color: var(--sub);
  margin-bottom: 6px;
}
input[type=text], input[type=password] {
  width: 100%;
  background: var(--surf2);
  border: 1px solid var(--border);
  border-radius: 7px;
  color: var(--text);
  font-size: 14px;
  padding: 9px 12px;
  outline: none;
  transition: border-color .15s;
  margin-bottom: 16px;
}
input[type=text]:focus, input[type=password]:focus {
  border-color: var(--accent);
}
.error {
  background: #2a1a1a;
  border: 1px solid var(--red);
  color: var(--red);
  border-radius: 7px;
  padding: 9px 12px;
  font-size: 13px;
  margin-bottom: 16px;
}
button {
  width: 100%;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 8px;
  padding: 10px;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  letter-spacing: .05em;
  transition: background .15s;
}
button:hover { background: var(--acc-h); }
.footer {
  text-align: center;
  margin-top: 20px;
  color: var(--sub);
  font-size: 13px;
}
.footer a {
  color: var(--accent);
  text-decoration: none;
}
.footer a:hover { color: var(--acc-h); }
</style>
</head>
<body>
<div class="card">
  <img src="/static/simdragosa-icon.png" alt="Simdragosa" style="height:60px;width:auto;display:block;margin:0 auto 8px;">
  <h1>Create Account</h1>
  {% if error %}
  <div class="error">{{ error }}</div>
  {% endif %}
  <form method="post" action="/register">
    <label for="username">Username</label>
    <input type="text" id="username" name="username" autocomplete="username" autofocus required maxlength="32">
    <label for="password">Password</label>
    <input type="password" id="password" name="password" autocomplete="new-password" required>
    <label for="invite_code">Invite Code</label>
    <input type="password" id="invite_code" name="invite_code" required>
    <button type="submit">Create Account</button>
  </form>
  <div class="footer">
    Already have an account? <a href="/login">Log in</a>
  </div>
</div>
</body>
</html>
