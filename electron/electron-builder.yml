appId: com.simdragosa.standalone
productName: Simdragosa
copyright: Copyright © 2024 Simdragosa

directories:
  output: ../release
  buildResources: ../static

icon: ../static/simdragosa-icon.png

extraResources:
  - from: ../dist/backend.exe
    to: backend.exe
    filter:
      - "**/*"

files:
  - "**/*"
  - "!node_modules/**"
  - "!dist/**"
  - "!**/*.test.js"

win:
  target:
    - target: nsis
      arch:
        - x64
  icon: ../static/simdragosa-icon.png
  artifactName: "Simdragosa-Setup-${version}.exe"

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  allowElevation: true
  installerIcon: ../static/simdragosa-icon.png
  uninstallerIcon: ../static/simdragosa-icon.png
  shortcutName: Simdragosa
  uninstallDisplayName: Simdragosa
  createDesktopShortcut: true
  createStartMenuShortcut: true

publish:
  provider: github
  owner: Xiantus
  repo: simdragosa-standalone
  releaseType: release
