name: Release

'on':
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Create the draft GitHub Release so both platform jobs can upload to it ──
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      tag: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v4
      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true

  # ── Windows build ─────────────────────────────────────────────────────────────
  build-windows:
    needs: create-release
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright Chromium (for healer sim support)
        run: python -m playwright install chromium
        continue-on-error: true

      - name: Build worker.exe with PyInstaller
        run: pyinstaller worker.spec --clean --noconfirm

      - name: Verify worker.exe was created
        run: |
          if (!(Test-Path "dist\worker.exe")) {
            Write-Error "worker.exe was not created by PyInstaller"
            exit 1
          }
          Write-Host "worker.exe size: $((Get-Item dist\worker.exe).Length) bytes"
        shell: pwsh

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Sync package.json version from git tag
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          npm version $version --no-git-tag-version --allow-same-version
        shell: pwsh

      - name: Run tests
        run: |
          npm test
          npx vitest run

      - name: Build Electron app
        run: npm run build

      - name: Package and publish NSIS installer
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run publish

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: installer-windows
          path: release/*.exe
          if-no-files-found: warn

  # ── macOS build ───────────────────────────────────────────────────────────────
  build-macos:
    needs: create-release
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright Chromium (for healer sim support)
        run: python -m playwright install chromium
        continue-on-error: true

      - name: Build worker binary with PyInstaller
        run: pyinstaller worker.spec --clean --noconfirm

      - name: Verify worker binary was created
        run: |
          test -f dist/worker || (echo "worker binary not found" && exit 1)
          ls -lh dist/worker

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Sync package.json version from git tag
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          npm version "$VERSION" --no-git-tag-version --allow-same-version

      - name: Run tests
        run: |
          npm test
          npx vitest run

      - name: Build Electron app
        run: npm run build

      - name: Package and publish DMG
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Notarization — uncomment and add secrets when Apple Developer account is ready:
          # APPLE_ID: ${{ secrets.APPLE_ID }}
          # APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          # APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: npm run publish

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: installer-macos
          path: release/*.dmg
          if-no-files-found: warn

  # ── Publish the draft release once both builds succeed ───────────────────────
  publish-release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Mark release as published
        uses: softprops/action-gh-release@v2
        with:
          draft: false
