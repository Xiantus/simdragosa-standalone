name: Release

'on':
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright Chromium (for healer sim support)
        run: python -m playwright install chromium
        continue-on-error: true

      - name: Build worker.exe with PyInstaller
        run: pyinstaller worker.spec --clean --noconfirm

      - name: Verify worker.exe was created
        run: |
          if (!(Test-Path "dist\worker.exe")) {
            Write-Error "worker.exe was not created by PyInstaller"
            exit 1
          }
          Write-Host "worker.exe size: $((Get-Item dist\worker.exe).Length) bytes"
        shell: pwsh

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Node dependencies
        working-directory: electron
        run: npm ci

      - name: Build and publish NSIS installer
        working-directory: electron
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run publish

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: installer
          path: release/Simdragosa-Setup-*.exe
          if-no-files-found: error
